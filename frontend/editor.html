<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NES Editor</title>
    <link rel="stylesheet" href="./index.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script type="importmap">
        { "imports": { "@kabukki/wasm-nes": "./index.js" } }
    </script>
</head>
<body>
    <div class="main">
        <div class="screen-wrapper">
            <div class="tv-frame" id="tvFrame">
                <div class="screen-container">
                    <canvas id="screen"></canvas>
                    <div class="start-screen" id="startScreen">
                        <div class="start-title" id="startTitle">LOADING...</div>
                        <label class="rom-label" id="romLabel" style="display: none">
                            LOAD ROM
                            <input class="rom-input" type="file" id="romInput" accept=".nes">
                        </label>
                        <div class="start-prompt" id="startPrompt" style="display: none">SELECT A .NES FILE</div>
                        <div class="error-msg" id="errorMsg"></div>
                    </div>
                </div>
                <div class="power-led">
                    <div class="led" id="powerLed"></div>
                    <span>POWER</span>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-section">
                <div class="panel-title">-- RAM WATCHES --</div>
                <div id="watches"></div>
            </div>

            <div class="panel-section">
                <div class="panel-title">-- EVENTS --</div>
                <div class="event-log" id="eventLog"></div>
            </div>

            <div class="panel-section">
                <div class="panel-title">-- SAVE STATES --</div>
                <div class="saves-list" id="savesList"></div>
                <button class="export-btn" id="exportBtn" style="display:none">EXPORT JSON</button>
            </div>

            <div class="panel-section">
                <div class="panel-title">-- CHANNELS --</div>
                <div class="saves-list" id="channelToggles">
                    <label class="save-item"><span>PULSE 1</span><input type="checkbox" data-ch="0" checked></label>
                    <label class="save-item"><span>PULSE 2</span><input type="checkbox" data-ch="1" checked></label>
                    <label class="save-item"><span>TRIANGLE</span><input type="checkbox" data-ch="2" checked></label>
                    <label class="save-item"><span>NOISE</span><input type="checkbox" data-ch="3" checked></label>
                    <label class="save-item"><span>DMC</span><input type="checkbox" data-ch="4" checked></label>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">Fork of <a href="https://github.com/kabukki/wasm-nes" style="color:#555">wasm-nes</a> by <a href="http://lucien.le-roux.dev/" style="color:#555">Lucien Le Roux</a></div>

    <script type="module">
        import { Nes, Button } from '@kabukki/wasm-nes';

        const canvas = document.getElementById('screen');
        canvas.width = Nes.VIDEO_WIDTH;
        canvas.height = Nes.VIDEO_HEIGHT;

        const startScreen = document.getElementById('startScreen');
        const romInput = document.getElementById('romInput');
        const powerLed = document.getElementById('powerLed');
        const tvFrame = document.getElementById('tvFrame');
        const errorMsg = document.getElementById('errorMsg');
        const startTitle = document.getElementById('startTitle');
        const startPrompt = document.getElementById('startPrompt');
        const romLabel = document.getElementById('romLabel');
        const watchesEl = document.getElementById('watches');
        const eventLog = document.getElementById('eventLog');
        const savesList = document.getElementById('savesList');
        const exportBtn = document.getElementById('exportBtn');
        const channelToggles = document.querySelectorAll('#channelToggles input[type="checkbox"]');

        channelToggles.forEach(cb => {
            cb.addEventListener('change', () => {
                const ch = parseInt(cb.dataset.ch, 10);
                if (emulator) emulator.setChannelMuted(ch, !cb.checked);
            });
        });

        function applyChannelMutes() {
            if (!emulator) return;
            channelToggles.forEach(cb => {
                const ch = parseInt(cb.dataset.ch, 10);
                emulator.setChannelMuted(ch, !cb.checked);
            });
        }

        let emulator = null;
        let config = null;

        const keyMap = {
            ArrowUp:    [0, Button.Up],
            ArrowDown:  [0, Button.Down],
            ArrowLeft:  [0, Button.Left],
            ArrowRight: [0, Button.Right],
            z:          [0, Button.A],
            Z:          [0, Button.A],
            x:          [0, Button.B],
            X:          [0, Button.B],
            Enter:      [0, Button.Start],
            Shift:      [0, Button.Select],
        };

        // MD5 hash (SubtleCrypto doesn't support MD5, so use a minimal implementation)
        async function md5Hex(buffer) {
            // Minimal MD5 for ROM hashing
            const k = new Uint32Array(64);
            for (let i = 0; i < 64; i++) k[i] = Math.floor(2**32 * Math.abs(Math.sin(i + 1)));
            const s = [7,12,17,22,7,12,17,22,7,12,17,22,7,12,17,22,
                       5,9,14,20,5,9,14,20,5,9,14,20,5,9,14,20,
                       4,11,16,23,4,11,16,23,4,11,16,23,4,11,16,23,
                       6,10,15,21,6,10,15,21,6,10,15,21,6,10,15,21];
            const bytes = new Uint8Array(buffer);
            const bitLen = bytes.length * 8;
            const padLen = (((bytes.length + 8) >>> 6) + 1) << 6;
            const padded = new Uint8Array(padLen);
            padded.set(bytes);
            padded[bytes.length] = 0x80;
            const view = new DataView(padded.buffer);
            view.setUint32(padLen - 8, bitLen >>> 0, true);
            view.setUint32(padLen - 4, (bitLen / 2**32) >>> 0, true);
            let a0 = 0x67452301, b0 = 0xefcdab89, c0 = 0x98badcfe, d0 = 0x10325476;
            for (let i = 0; i < padLen; i += 64) {
                const M = new Uint32Array(16);
                for (let j = 0; j < 16; j++) M[j] = view.getUint32(i + j * 4, true);
                let A = a0, B = b0, C = c0, D = d0;
                for (let j = 0; j < 64; j++) {
                    let F, g;
                    if (j < 16) { F = (B & C) | (~B & D); g = j; }
                    else if (j < 32) { F = (D & B) | (~D & C); g = (5*j+1) % 16; }
                    else if (j < 48) { F = B ^ C ^ D; g = (3*j+5) % 16; }
                    else { F = C ^ (B | ~D); g = (7*j) % 16; }
                    F = (F + A + k[j] + M[g]) >>> 0;
                    A = D; D = C; C = B;
                    B = (B + ((F << s[j]) | (F >>> (32 - s[j])))) >>> 0;
                }
                a0 = (a0 + A) >>> 0; b0 = (b0 + B) >>> 0;
                c0 = (c0 + C) >>> 0; d0 = (d0 + D) >>> 0;
            }
            const hex = (v) => Array.from(new Uint8Array(new Uint32Array([v]).buffer))
                .map(b => b.toString(16).padStart(2, '0')).join('');
            return hex(a0) + hex(b0) + hex(c0) + hex(d0);
        }

        // Parse hex address strings from config
        function addr(s) { return typeof s === 'string' ? parseInt(s, 16) : s; }

        const watchValueEls = {};
        let watches = [];

        function buildWatchDisplay() {
            watchesEl.innerHTML = '';
            Object.keys(watchValueEls).forEach(k => delete watchValueEls[k]);

            if (!config.watches.length) {
                watchesEl.textContent = 'No watches configured';
                return;
            }
            for (const w of config.watches) {
                const a = addr(w.address);
                const row = document.createElement('div');
                row.className = 'watch-row';
                row.title = w.description || '';
                row.innerHTML = `<span>${w.name} ($${a.toString(16).padStart(4,'0')})</span><span class="watch-value">--</span>`;
                watchesEl.appendChild(row);
                watchValueEls[w.name] = row.querySelector('.watch-value');
            }
            watches = config.watches.map(w => ({ address: addr(w.address), name: w.name }));
        }

        async function loadConfig(romBuffer) {
            const hash = await md5Hex(romBuffer);
            try {
                const res = await fetch(`./${hash}/rom-config.json`);
                if (!res.ok) throw new Error(`${res.status}`);
                config = await res.json();
            } catch {
                config = { name: 'Unknown ROM', watches: [], events: [] };
            }
            document.title = `NES Editor - ${config.name}`;
            buildWatchDisplay();
        }

        function addEvent(text, cls) {
            const entry = document.createElement('div');
            entry.className = 'entry ' + (cls || '');
            entry.textContent = text;
            eventLog.prepend(entry);
            while (eventLog.children.length > 50) eventLog.lastChild.remove();
        }

        function getSaveKeyPrefix() {
            if (!config.saveState) return 'save-';
            return config.saveState.keyTemplate.split('{')[0];
        }

        function refreshSavesList() {
            savesList.innerHTML = '';
            const prefix = getSaveKeyPrefix();
            let count = 0;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (!key.startsWith(prefix)) continue;
                count++;
                const item = document.createElement('div');
                item.className = 'save-item';
                item.innerHTML = `<a class="save-link" href="#" data-door="${key}">${key}</a><button class="save-delete" data-key="${key}">DEL</button>`;
                savesList.appendChild(item);
            }
            if (!count) {
                savesList.textContent = 'No save states yet. Press S to save.';
            }
            exportBtn.style.display = count ? '' : 'none';
            savesList.querySelectorAll('.save-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    loadSaveState(link.dataset.door);
                });
            });
            savesList.querySelectorAll('.save-delete').forEach(btn => {
                btn.addEventListener('click', () => {
                    localStorage.removeItem(btn.dataset.key);
                    refreshSavesList();
                });
            });
        }

        exportBtn.addEventListener('click', () => {
            const prefix = getSaveKeyPrefix();
            const states = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (!key.startsWith(prefix)) continue;
                states[key] = localStorage.getItem(key);
            }
            const json = JSON.stringify(states, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'save-states.json';
            a.click();
            URL.revokeObjectURL(url);
        });

        // Compression helpers using native CompressionStream (deflate)
        const MAGIC = [0x4E, 0x45, 0x53, 0x53]; // "NESS" - start of uncompressed "NESSAVE1"

        async function compressBytes(data) {
            const cs = new CompressionStream('deflate');
            const writer = cs.writable.getWriter();
            writer.write(data);
            writer.close();
            const reader = cs.readable.getReader();
            const chunks = [];
            for (;;) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
            }
            let len = 0;
            for (const c of chunks) len += c.length;
            const result = new Uint8Array(len);
            let off = 0;
            for (const c of chunks) { result.set(c, off); off += c.length; }
            return result;
        }

        async function decompressBytes(data) {
            const ds = new DecompressionStream('deflate');
            const writer = ds.writable.getWriter();
            writer.write(data);
            writer.close();
            const reader = ds.readable.getReader();
            const chunks = [];
            for (;;) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
            }
            let len = 0;
            for (const c of chunks) len += c.length;
            const result = new Uint8Array(len);
            let off = 0;
            for (const c of chunks) { result.set(c, off); off += c.length; }
            return result;
        }

        function toBase64(bytes) {
            let s = '';
            for (let i = 0; i < bytes.length; i += 8192) {
                s += String.fromCharCode(...bytes.subarray(i, i + 8192));
            }
            return btoa(s);
        }

        function fromBase64(str) {
            return Uint8Array.from(atob(str), c => c.charCodeAt(0));
        }

        function isUncompressed(bytes) {
            return bytes.length >= 4 &&
                bytes[0] === MAGIC[0] && bytes[1] === MAGIC[1] &&
                bytes[2] === MAGIC[2] && bytes[3] === MAGIC[3];
        }

        async function decodeSaveState(encoded) {
            const raw = fromBase64(encoded);
            if (isUncompressed(raw)) return raw;
            return await decompressBytes(raw);
        }

        async function loadSaveState(key) {
            if (!emulator) return;
            const saved = localStorage.getItem(key);
            if (!saved) return;
            const bytes = await decodeSaveState(saved);
            emulator.loadState(bytes);
            addEvent(`Loaded: ${key}`, 'save');
        }

        async function saveCurrentState() {
            if (!emulator || !config.saveState) return;

            const values = {};
            for (const r of config.saveState.reads) {
                let v = emulator.readMemory(addr(r.address));
                if (r.transform === 'divFloor4Add1') v = Math.floor(v / 4) + 1;
                else if (r.transform === 'mod4Add1') v = (v % 4) + 1;
                values[r.token] = v;
            }
            const baseKey = config.saveState.keyTemplate.replace(
                /\{(\w+)\}/g, (_, token) => values[token] ?? '?'
            );

            // Find next available counter for this base key
            let n = 0;
            const prefix = getSaveKeyPrefix();
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (!k.startsWith(prefix)) continue;
                const m = k.match(/-(\d+)$/);
                if (m && k.slice(0, -m[0].length) === baseKey) {
                    n = Math.max(n, parseInt(m[1]) + 1);
                }
            }
            const key = `${baseKey}-${n}`;

            const state = emulator.saveState();
            const compressed = await compressBytes(state);
            const encoded = toBase64(compressed);

            localStorage.setItem(key, encoded);
            const ratio = ((1 - compressed.length / state.length) * 100).toFixed(0);
            addEvent(`Saved: ${key} (${state.length}B -> ${compressed.length}B, -${ratio}%)`, 'save');
            refreshSavesList();
        }

        // Build event handlers from config (events fire log entries only)
        function buildEventHandlers() {
            return (changes) => {
                for (const c of changes) {
                    // Update watch display
                    const el = watchValueEls[c.name];
                    if (el) {
                        el.textContent = c.newValue;
                        el.classList.add('changed');
                        setTimeout(() => el.classList.remove('changed'), 300);
                    }

                    // Check each configured event
                    for (const event of (config.events || [])) {
                        const trigger = event.trigger;
                        if (c.name !== trigger.watch) continue;
                        if (trigger.equals !== undefined && c.newValue !== trigger.equals) continue;
                        addEvent(event.label || event.name, 'pipe');
                    }
                }
            };
        }

        function showFilePicker() {
            startTitle.textContent = 'INSERT CARTRIDGE';
            romLabel.style.display = '';
            startPrompt.style.display = '';
        }

        let pendingRom = null;

        async function startEmulator(romData) {
            errorMsg.classList.remove('visible');
            try {
                if (emulator) emulator.stop();

                await loadConfig(romData);

                const rom = new Uint8Array(romData);
                emulator = await Nes.new(rom);
                emulator.canvas = canvas;
                emulator.audio.fix();

                if (watches.length) {
                    emulator.watchMemory(watches);
                    emulator.onMemoryChange = buildEventHandlers();
                }

                // Snapshot initial values
                for (const w of watches) {
                    const el = watchValueEls[w.name];
                    if (el) el.textContent = emulator.readMemory(w.address);
                }

                refreshSavesList();
                addEvent(`Loaded: ${config.name}`, '');
                emulator.start();
                applyChannelMutes();

                // Load save state from ?door= query param
                const doorParam = new URLSearchParams(window.location.search).get('door');
                if (doorParam) {
                    loadSaveState(doorParam);
                }

                startScreen.classList.add('hidden');
                powerLed.classList.add('on');
                tvFrame.classList.add('running');
            } catch (err) {
                console.error(err);
                errorMsg.textContent = 'BAD ROM: ' + (err.message || 'UNKNOWN ERROR');
                errorMsg.classList.add('visible');
                showFilePicker();
            }
        }

        function showPressStart() {
            startTitle.textContent = 'PRESS START';
            startPrompt.textContent = 'CLICK OR PRESS ANY KEY';
            startPrompt.style.display = '';
            romLabel.style.display = 'none';
        }

        function onUserInteraction() {
            if (!pendingRom) return;
            const romData = pendingRom;
            pendingRom = null;
            document.removeEventListener('click', onUserInteraction);
            document.removeEventListener('keydown', onUserInteraction);
            startEmulator(romData);
        }

        showFilePicker();

        romInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            pendingRom = null;
            document.removeEventListener('click', onUserInteraction);
            document.removeEventListener('keydown', onUserInteraction);
            await startEmulator(await file.arrayBuffer());
        });

        document.addEventListener('keydown', (e) => {
            if (!emulator) return;
            if (e.key === 'Escape') { emulator.reset(); return; }
            if (e.key === 's' || e.key === 'S') { saveCurrentState(); return; }
            const mapping = keyMap[e.key];
            if (mapping) { e.preventDefault(); emulator.input(mapping[0], mapping[1], true); }
        });

        document.addEventListener('keyup', (e) => {
            if (!emulator) return;
            const mapping = keyMap[e.key];
            if (mapping) { e.preventDefault(); emulator.input(mapping[0], mapping[1], false); }
        });
    </script>
</body>
</html>
